<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f7efe2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>난타 연주 — 난타북 웹앱</title>
<style>
  /* ============================================================
     난타 연주 웹앱 스타일
     - 모바일 세로 화면 우선, 데스크톱 대응
     - 스크롤/더블탭 확대/롱프레스 메뉴 방지
     ============================================================ */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    position: fixed; inset: 0; overflow: hidden;
    background: linear-gradient(180deg, #fbf7ee 0%, #f4ead7 60%, #eddfc6 100%);
    font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
    color: #2a1c10;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    overscroll-behavior: none;
  }

  /* ---------- 연주 캔버스 ---------- */
  #stage {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block; touch-action: none; cursor: pointer;
  }

  /* ---------- 상단 HUD ---------- */
  #hud {
    position: absolute; top: 0; left: 0; right: 0; z-index: 5;
    display: flex; align-items: center; gap: 10px;
    padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
    pointer-events: none;
  }
  #hud .brand { display: flex; align-items: center; gap: 8px; font-weight: 900; font-size: 17px; letter-spacing: -0.3px; }
  #hud .brand img { height: 30px; width: auto; }
  #hud .spacer { flex: 1; }
  #hud .stat {
    pointer-events: none;
    background: rgba(255,255,255,0.72); backdrop-filter: blur(6px);
    border: 1px solid rgba(42,28,16,0.10);
    border-radius: 999px; padding: 7px 14px;
    font-size: 13px; font-weight: 800; color: #5d452c; white-space: nowrap;
  }
  #hud .stat b { color: #2a1c10; font-variant-numeric: tabular-nums; }
  .hud-btn {
    pointer-events: auto;
    width: 44px; height: 44px; flex: 0 0 auto;
    border-radius: 13px; border: 1px solid rgba(42,28,16,0.14);
    background: rgba(255,255,255,0.82); backdrop-filter: blur(6px);
    font-size: 20px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(80,50,20,0.10);
    transition: transform 120ms ease;
  }
  .hud-btn:active { transform: scale(0.92); }

  /* ---------- 하단 안내 ---------- */
  #bottomHint {
    position: absolute; left: 50%; transform: translateX(-50%);
    bottom: calc(12px + env(safe-area-inset-bottom));
    z-index: 5; pointer-events: none;
    background: rgba(255,255,255,0.72); backdrop-filter: blur(6px);
    border: 1px solid rgba(42,28,16,0.08);
    padding: 9px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 700; color: #5d452c;
    white-space: nowrap; max-width: 94vw; overflow: hidden; text-overflow: ellipsis;
  }
  #bottomHint b.bass { color: #b35a17; }
  #bottomHint b.slap { color: #c0392b; }

  /* ---------- 시작 화면 오버레이 ---------- */
  #introOverlay {
    position: absolute; inset: 0; z-index: 20;
    display: flex; align-items: center; justify-content: center;
    padding: 18px;
    background:
      radial-gradient(120% 90% at 50% 0%, rgba(255,255,255,0.92) 0%, rgba(250,243,229,0.96) 55%, rgba(240,228,204,0.97) 100%);
    overflow-y: auto;
  }
  .intro-card {
    background: rgba(255,255,255,0.92);
    border: 1px solid rgba(42,28,16,0.08);
    border-radius: 28px;
    padding: 26px 22px 22px;
    width: 100%; max-width: 430px;
    text-align: center;
    box-shadow: 0 24px 70px rgba(80,50,20,0.16);
  }
  .intro-icon { height: 72px; width: auto; margin-bottom: 6px; }
  .intro-card h1 { font-size: 32px; font-weight: 900; letter-spacing: -0.8px; }
  .intro-sub { margin-top: 6px; font-size: 14.5px; font-weight: 600; color: #7a5f41; }
  .intro-guide {
    width: min(210px, 56%); height: auto; margin: 16px auto 4px; display: block;
    filter: drop-shadow(0 10px 22px rgba(80,50,20,0.18));
  }
  .tone-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
  .tone-card {
    border-radius: 16px; padding: 12px 10px;
    background: #fdf8ef; border: 1px solid rgba(42,28,16,0.08);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .tone-card b { font-size: 14px; }
  .tone-card span { font-size: 12.5px; color: #7a5f41; font-weight: 600; }
  .tone-dot { width: 14px; height: 14px; border-radius: 50%; margin-bottom: 2px; }
  .tone-dot.bass { background: #b35a17; box-shadow: 0 0 0 4px rgba(179,90,23,0.15); }
  .tone-dot.slap { background: #c0392b; box-shadow: 0 0 0 4px rgba(192,57,43,0.15); }
  #startBtn {
    margin-top: 18px; width: 100%; min-height: 58px;
    border: none; border-radius: 18px; cursor: pointer;
    background: linear-gradient(135deg, #c2571b, #8a3d12);
    color: #fff; font-size: 19px; font-weight: 900; letter-spacing: -0.3px;
    box-shadow: 0 12px 30px rgba(160,80,20,0.35);
    transition: transform 120ms ease;
    font-family: inherit;
  }
  #startBtn:active { transform: scale(0.97); }
  .intro-help { margin-top: 14px; font-size: 12.5px; line-height: 1.7; color: #8a7050; font-weight: 600; }
  .intro-help b { color: #5d452c; background: #f3e9d8; border-radius: 6px; padding: 1px 6px; }

  .hidden { display: none !important; }

  /* 터치 전용 기기에서는 키보드 안내 숨김 */
  @media (pointer: coarse) {
    .kbd-only { display: none; }
  }

  /* ============================================================
     리듬 게임 UI — 선택 화면 / 모달 / HUD 확장
     ============================================================ */
  .screen { position: absolute; inset: 0; z-index: 30; background: rgba(252,248,240,0.97); overflow-y: auto; -webkit-overflow-scrolling: touch; touch-action: pan-y; }
  .rs-header { display: flex; align-items: center; gap: 12px; max-width: 960px; margin: 0 auto; padding: calc(12px + env(safe-area-inset-top)) 16px 4px; }
  .rs-header h2 { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
  .rs-header p { font-size: 12.5px; color: #8a7050; font-weight: 600; margin-top: 2px; }
  .rs-tabs { display: flex; gap: 8px; overflow-x: auto; max-width: 960px; margin: 10px auto; padding: 0 16px 6px; scrollbar-width: none; }
  .rs-tabs::-webkit-scrollbar { display: none; }
  .rs-tabs button { min-height: 40px; padding: 0 15px; border-radius: 999px; border: 1px solid rgba(42,28,16,0.14); background: #fff; font-weight: 800; font-size: 13.5px; white-space: nowrap; cursor: pointer; color: #5d452c; font-family: inherit; }
  .rs-tabs button.active { background: #2a1c10; color: #fff; border-color: #2a1c10; }
  .rs-layout { max-width: 960px; margin: 0 auto; display: grid; grid-template-columns: minmax(0,1.12fr) minmax(290px,0.88fr); gap: 14px; padding: 0 16px calc(26px + env(safe-area-inset-bottom)); }
  .rs-cards { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; align-content: start; }
  .r-card { position: relative; text-align: left; border: 1.5px solid rgba(42,28,16,0.12); background: rgba(255,255,255,0.9); border-radius: 18px; padding: 13px 14px; cursor: pointer; transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease; font-family: inherit; }
  .r-card:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(80,50,20,0.10); }
  .r-card.selected { border-color: #2a1c10; box-shadow: 0 0 0 3px rgba(42,28,16,0.10), 0 14px 34px rgba(80,50,20,0.12); }
  .r-card h3 { font-size: 15.5px; font-weight: 900; margin: 7px 0 1px; color: #2a1c10; }
  .r-card .en { font-size: 11px; color: #a08866; font-weight: 700; }
  .r-card .desc { font-size: 12px; color: #7a5f41; margin-top: 4px; line-height: 1.45; }
  .r-top { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .diff-badge { display: inline-block; font-size: 11px; font-weight: 900; color: #fff; border-radius: 999px; padding: 3px 9px; }
  .stars { font-size: 11px; color: #e8a013; letter-spacing: 1px; }
  .r-meta { display: flex; gap: 8px; font-size: 11px; color: #8a7050; font-weight: 700; margin-top: 7px; flex-wrap: wrap; }
  .r-rec { font-size: 11.5px; font-weight: 800; margin-top: 6px; color: #5d452c; }
  .reco-badge { position: absolute; top: -8px; right: 10px; background: #e8a013; color: #fff; font-size: 10.5px; font-weight: 900; padding: 3px 8px; border-radius: 999px; box-shadow: 0 4px 10px rgba(232,160,19,0.4); }
  .done-check { color: #3f9d4e; font-weight: 900; }
  .rs-detail { position: sticky; top: 12px; align-self: start; background: rgba(255,255,255,0.94); border: 1px solid rgba(42,28,16,0.10); border-radius: 22px; padding: 16px; box-shadow: 0 14px 36px rgba(80,50,20,0.10); }
  .rs-detail h3 { font-size: 19px; font-weight: 900; margin-top: 6px; }
  .rs-detail .en { color: #a08866; font-size: 12px; font-weight: 700; }
  .d-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin: 12px 0; }
  .d-grid div { background: #faf4e8; border-radius: 12px; padding: 8px 4px; text-align: center; }
  .d-grid strong { display: block; font-size: 15px; font-weight: 900; }
  .d-grid span { font-size: 10.5px; color: #8a7050; font-weight: 700; }
  .rs-detail h4 { font-size: 12.5px; margin: 12px 0 4px; color: #5d452c; }
  .rs-detail .desc { font-size: 13px; line-height: 1.55; color: #4a3a26; }
  .rs-detail ul { margin: 0; padding-left: 18px; font-size: 12.5px; color: #7a5f41; line-height: 1.65; text-align: left; }
  #rsPreviewCanvas { width: 100%; height: auto; background: #faf4e8; border-radius: 12px; }
  .record-line { font-size: 12.5px; font-weight: 800; color: #5d452c; background: #faf4e8; border-radius: 10px; padding: 8px 10px; margin-top: 4px; }
  .rs-actions { display: grid; gap: 8px; margin-top: 14px; }
  .btn-primary { min-height: 50px; border: none; border-radius: 14px; background: linear-gradient(135deg,#c2571b,#8a3d12); color: #fff; font-size: 16px; font-weight: 900; cursor: pointer; font-family: inherit; box-shadow: 0 8px 22px rgba(160,80,20,0.28); transition: transform .12s; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-secondary { min-height: 46px; border: 1.5px solid rgba(42,28,16,0.16); border-radius: 14px; background: #fff; color: #3c2a18; font-size: 14.5px; font-weight: 800; cursor: pointer; font-family: inherit; transition: transform .12s; }
  .btn-secondary:active { transform: scale(0.97); }
  .btn-row { display: grid; gap: 9px; margin-top: 14px; }
  .btn-row.two { grid-template-columns: 1fr 1fr; }
  @media (max-width: 760px) {
    .rs-layout { display: block; }
    .rs-detail { position: static; margin-top: 12px; }
  }
  @media (max-width: 480px) { .rs-cards { grid-template-columns: 1fr; } }

  /* ---------- 모달 공통 ---------- */
  .modal-back { position: absolute; inset: 0; z-index: 40; background: rgba(40,25,12,0.45); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 18px; }
  .modal { background: #fffdf8; border-radius: 24px; padding: 24px 20px; width: 100%; max-width: 430px; box-shadow: 0 24px 70px rgba(60,35,10,0.30); border: 1px solid rgba(42,28,16,0.08); text-align: center; max-height: 86vh; overflow-y: auto; }
  .modal h2 { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }

  /* ---------- 설정 ---------- */
  .set-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 13px 2px; border-bottom: 1px solid rgba(42,28,16,0.07); font-size: 14px; font-weight: 800; color: #3c2a18; }
  .set-row .ctl { display: flex; align-items: center; gap: 8px; }
  .set-row input[type="range"] { width: 130px; accent-color: #b35a17; }
  .set-row .val { font-size: 12px; color: #8a7050; min-width: 48px; text-align: right; font-variant-numeric: tabular-nums; }
  .seg { display: flex; border: 1.5px solid rgba(42,28,16,0.16); border-radius: 10px; overflow: hidden; }
  .seg button { border: none; background: #fff; padding: 7px 11px; font-size: 12.5px; font-weight: 800; cursor: pointer; color: #5d452c; font-family: inherit; }
  .seg button.active { background: #2a1c10; color: #fff; }
  .switch { width: 46px; height: 26px; border-radius: 999px; border: none; cursor: pointer; position: relative; background: #d8cbb6; transition: background .15s; flex: 0 0 auto; }
  .switch.on { background: #b35a17; }
  .switch::after { content: ""; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: left .15s; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
  .switch.on::after { left: 23px; }

  /* ---------- 결과 ---------- */
  .grade-circle { width: 86px; height: 86px; border-radius: 50%; margin: 12px auto 6px; display: flex; align-items: center; justify-content: center; font-size: 44px; font-weight: 900; color: #fff; box-shadow: 0 12px 30px rgba(80,50,20,0.25); }
  .res-rhythm { font-size: 13px; font-weight: 800; color: #8a7050; }
  .res-score { font-size: 34px; font-weight: 900; letter-spacing: -1px; margin-top: 2px; }
  .new-best { display: inline-block; background: #e8a013; color: #fff; font-size: 10.5px; font-weight: 900; border-radius: 999px; padding: 2px 8px; vertical-align: middle; margin-left: 6px; }
  .res-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin: 12px 0 4px; }
  .res-grid div { background: #faf4e8; border-radius: 12px; padding: 8px 2px; }
  .res-grid strong { display: block; font-size: 16px; font-weight: 900; }
  .res-grid span { font-size: 10.5px; font-weight: 800; }
  .tone-rates { display: grid; gap: 6px; margin: 10px 0; text-align: left; }
  .tone-rate { font-size: 12px; font-weight: 800; color: #5d452c; }
  .tone-rate .bar { height: 8px; border-radius: 999px; background: #f0e6d4; overflow: hidden; margin-top: 3px; }
  .tone-rate .bar i { display: block; height: 100%; border-radius: 999px; }
  .res-feedback { font-size: 13.5px; font-weight: 700; color: #4a3a26; line-height: 1.55; margin: 10px 0 2px; }
  .res-reco { font-size: 12.5px; font-weight: 800; color: #8a7050; margin-top: 6px; }

  /* ---------- 게임 진행 바 ---------- */
  #progressBar { position: absolute; top: 0; left: 0; right: 0; height: 4px; z-index: 6; background: rgba(42,28,16,0.08); }
  #progressBar i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg,#c2571b,#e8a013); transition: width .2s linear; }

  @media (max-height: 600px) {
    .intro-guide { width: 130px; }
    .intro-card h1 { font-size: 26px; }
    .intro-card { padding: 18px 18px 16px; }
  }
</style>
</head>
<body>

  <!-- ===== 상단 HUD ===== -->
  <header id="hud">
    <div class="brand">
      <img id="hudIcon" src="assets/icon-nanta.png" alt="" onerror="this.style.display='none'">
      <span>난타 연주</span>
    </div>
    <div class="spacer"></div>
    <div class="stat" id="freeStat">베이스 <b id="bassCount">0</b> · 슬랩 <b id="slapCount">0</b></div>
    <div class="stat hidden" id="gameStat"><b id="scoreVal">0</b>점 · <b id="accVal">100%</b></div>
    <button class="hud-btn hidden" id="pauseBtn" aria-label="일시정지">⏸</button>
    <button class="hud-btn" id="muteBtn" aria-label="소리 켜기/끄기">🔊</button>
    <button class="hud-btn" id="helpBtn" aria-label="도움말 보기">❔</button>
  </header>

  <!-- ===== 게임 진행 바 ===== -->
  <div id="progressBar" class="hidden"><i id="progressFill"></i></div>

  <!-- ===== 연주 캔버스 ===== -->
  <canvas id="stage" aria-label="난타북 연주 영역. 중앙을 치면 베이스톤, 테두리를 치면 슬랩톤이 납니다."></canvas>

  <!-- ===== 하단 안내 ===== -->
  <div id="bottomHint"></div>

  <!-- ===== 시작 화면 ===== -->
  <section id="introOverlay" aria-label="시작 화면">
    <div class="intro-card">
      <img class="intro-icon" src="assets/icon-nanta.png" alt="난타북 아이콘" onerror="this.style.display='none'">
      <h1>난타 연주</h1>
      <p class="intro-sub">난타북을 직접 두드리며 리듬을 즐겨보세요</p>
      <img class="intro-guide" src="assets/pose-guide.png" alt="난타북 위에 난타채 두 개가 세모꼴로 놓인 기본 자세" onerror="this.style.display='none'">
      <div class="tone-cards">
        <div class="tone-card">
          <div class="tone-dot bass"></div>
          <b>중앙 · 베이스톤</b>
          <span>“둥” 묵직한 울림</span>
        </div>
        <div class="tone-card">
          <div class="tone-dot slap"></div>
          <b>테두리 · 슬랩톤</b>
          <span>“딱” 경쾌한 타격</span>
        </div>
      </div>
      <button id="startBtn">🥁 리듬 게임 시작</button>
      <div class="btn-row two">
        <button id="freePlayBtn" class="btn-secondary">🎵 자유 연주</button>
        <button id="settingsBtn" class="btn-secondary">⚙️ 설정</button>
      </div>
      <p class="intro-help">
        마우스 클릭 또는 화면 터치로 연주합니다<br>
        <span class="kbd-only">키보드 <b>F</b>·<b>J</b> 베이스 · <b>D</b>·<b>K</b> 슬랩 · <b>Space</b> 양손 베이스</span>
      </p>
    </div>
  </section>

  <!-- ===== 리듬 선택 화면 ===== -->
  <section id="rhythmSelect" class="screen hidden" aria-label="리듬 선택 화면">
    <header class="rs-header">
      <button class="hud-btn" id="rsBackBtn" aria-label="시작 화면으로 돌아가기">←</button>
      <div>
        <h2>리듬 선택</h2>
        <p>난이도에 맞는 난타 리듬을 골라보세요</p>
      </div>
    </header>
    <nav class="rs-tabs" id="rsTabs" aria-label="난이도 필터">
      <button data-diff="all" class="active">전체</button>
      <button data-diff="intro">🌱 입문</button>
      <button data-diff="beginner">🥁 초급</button>
      <button data-diff="intermediate">🔥 중급</button>
      <button data-diff="advanced">⚡ 고급</button>
    </nav>
    <main class="rs-layout">
      <section class="rs-cards" id="rsCards" aria-label="리듬 목록"></section>
      <aside class="rs-detail" id="rsDetail" aria-label="선택한 리듬 상세 정보"></aside>
    </main>
  </section>

  <!-- ===== 일시정지 모달 ===== -->
  <div id="pauseModal" class="modal-back hidden">
    <div class="modal">
      <h2>⏸ 일시정지</h2>
      <div class="btn-row">
        <button id="resumeBtn" class="btn-primary">계속하기</button>
        <button id="restartBtn" class="btn-secondary">처음부터 다시</button>
        <button id="quitBtn" class="btn-secondary">리듬 선택으로</button>
      </div>
    </div>
  </div>

  <!-- ===== 결과 모달 ===== -->
  <div id="resultModal" class="modal-back hidden">
    <div class="modal" id="resultBody"></div>
  </div>

  <!-- ===== 설정 모달 ===== -->
  <div id="settingsModal" class="modal-back hidden">
    <div class="modal">
      <h2>⚙️ 설정</h2>
      <div class="set-row">
        <span>음량</span>
        <span class="ctl"><input type="range" id="setVolume" min="0" max="100" step="5"><span class="val" id="setVolumeVal"></span></span>
      </div>
      <div class="set-row">
        <span>노트 속도</span>
        <span class="seg" id="setSpeed">
          <button data-v="slow">느림</button><button data-v="normal">보통</button><button data-v="fast">빠름</button>
        </span>
      </div>
      <div class="set-row">
        <span>판정 오프셋</span>
        <span class="ctl"><input type="range" id="setOffset" min="-150" max="150" step="5"><span class="val" id="setOffsetVal"></span></span>
      </div>
      <div class="set-row">
        <span>박자 가이드음</span>
        <button class="switch" id="setTick" aria-label="박자 가이드음 켜기/끄기"></button>
      </div>
      <div class="set-row" style="border-bottom:none">
        <span>터치 진동</span>
        <button class="switch" id="setVibrate" aria-label="터치 진동 켜기/끄기"></button>
      </div>
      <div class="btn-row"><button id="settingsClose" class="btn-primary">닫기</button></div>
    </div>
  </div>

<script>
"use strict";

/* ============================================================
   난타 연주 웹앱
   - 중앙 타격: 베이스톤("둥") / 테두리 타격: 슬랩톤("딱")
   - 난타채 2개가 세모꼴로 북 위에 놓여 있고, 입력 지점을 향해 타격
   - 오디오 파일 없이 Web Audio API로 북 사운드를 합성 (지연 최소화)
   - 이미지 에셋이 없어도 Canvas 대체 그래픽으로 동작
   ============================================================ */

/* ---------- 에셋 매니페스트: 파일명을 바꾸려면 여기만 수정 ---------- */
const ASSETS = {
  drumHead: "assets/drum-head.png",   // 북면 실사(탑뷰)
  icon:     "assets/icon-nanta.png",  // 난타북 아이콘
  pose:     "assets/pose-guide.png"   // 기본 자세 안내(시작 화면)
};

/* ---------- 주요 튜닝 값 ---------- */
const CONFIG = {
  drum: {
    cyRatio: 0.55,        // 화면 높이 대비 북 중심 y 위치
    radiusRatioW: 0.44,   // 화면 너비 대비 북 반지름 비율
    radiusRatioH: 0.37,   // 화면 높이 대비 북 반지름 비율
    bassZoneRatio: 0.63,  // 이 비율 안쪽 = 베이스톤(중앙)
    hitOuterRatio: 1.12   // 이 비율 바깥 클릭은 무시
  },
  photo: {                // 사진 속 북면 원의 위치(이미지 크기 대비 비율) — 사진 교체 시 보정
    cx: 0.496, cy: 0.482,    // 북면 중심 (이미지 너비/높이 대비)
    rx: 0.437, ry: 0.427,    // 북면 반지름 (가로는 너비, 세로는 높이 대비 — 타원 보정)
    overscan: 1.03           // 가장자리 투명 픽셀이 보이지 않도록 살짝 확대
  },
  stick: {
    lengthRatio: 1.06,    // 북 반지름 대비 난타채 길이
    restTipGap: 0.075,    // 휴지 자세에서 채 끝이 중심에서 벌어진 정도(세모꼴 꼭짓점 간격)
    restTipY: -0.13,      // 휴지 자세 채 끝 y 오프셋
    restAngleDeg: 58,     // 휴지 자세 기울기(수평 기준) — 세모꼴 각도
    maxSwingDeg: 60,      // 타격 시 휴지 각도에서 최대 회전 허용치
    strikeMs: 70,         // 타격 도달 시간
    holdMs: 60,           // 타격 후 머무는 시간
    returnMs: 260         // 제자리로 복귀하는 시간
  },
  particle: { max: 220 },
  audio: { masterGain: 0.9 }
};

/* ---------- 공용 유틸 ---------- */
const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
const lerp = (a, b, t) => a + (b - a) * t;
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
const easeInOutQuad = t => (t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2);
/* 최단 경로 각도 보간 */
function lerpAngle(a, b, t) {
  let d = (b - a) % (Math.PI * 2);
  if (d > Math.PI) d -= Math.PI * 2;
  if (d < -Math.PI) d += Math.PI * 2;
  return a + d * t;
}

/* ============================================================
   AudioEngine — Web Audio API 합성 사운드
   - 사용자 제스처 이후에만 AudioContext 생성/resume
   - 베이스톤: 낮게 떨어지는 사인파 + 저역 노이즈 어택 (둥)
   - 슬랩톤: 밴드패스 노이즈 크랙 + 짧은 우드 톤 (딱)
   ============================================================ */
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.bus = null;      // 컴프레서 입력(개별 사운드 연결 지점)
    this.master = null;   // 마스터 게인(음소거 제어)
    this.noiseBuf = null;
    this.muted = false;
    this.volume = CONFIG.audio.masterGain; // 설정에서 조절되는 기본 음량
  }

  /* 첫 제스처에서 호출 — 이미 만들어졌으면 resume만 */
  ensure() {
    if (!this.ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) { console.warn("[난타] Web Audio 미지원 브라우저입니다."); return; }
      this.ctx = new AC({ latencyHint: "interactive" });

      // 동시 다타 시 클리핑 방지용 컴프레서 → 마스터 게인
      const comp = this.ctx.createDynamicsCompressor();
      comp.threshold.value = -14; comp.knee.value = 24;
      comp.ratio.value = 5; comp.attack.value = 0.002; comp.release.value = 0.12;
      this.master = this.ctx.createGain();
      this.master.gain.value = this.muted ? 0 : this.volume;
      comp.connect(this.master).connect(this.ctx.destination);
      this.bus = comp;

      // 노이즈 버퍼(1초) 미리 생성 — 매 타격마다 재사용
      const len = this.ctx.sampleRate;
      this.noiseBuf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
      const ch = this.noiseBuf.getChannelData(0);
      for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    }
    if (this.ctx.state === "suspended") this.ctx.resume();
  }

  setMuted(m) {
    this.muted = m;
    if (this.master) this.master.gain.value = m ? 0 : this.volume;
  }

  setVolume(v) {
    this.volume = v;
    if (this.master && !this.muted) this.master.gain.value = v;
  }

  _noiseSrc() {
    const s = this.ctx.createBufferSource();
    s.buffer = this.noiseBuf;
    return s;
  }

  /* 베이스톤 "둥" — 북 중앙의 묵직한 울림 */
  playBass(vel = 1) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const det = 0.95 + Math.random() * 0.1; // 매 타격 미세한 음정 변화(자연스러움)

    // 1) 울림 본체: 150Hz → 53Hz로 떨어지는 사인파
    const o = this.ctx.createOscillator();
    o.type = "sine";
    o.frequency.setValueAtTime(150 * det, t);
    o.frequency.exponentialRampToValueAtTime(53 * det, t + 0.11);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.95 * vel, t + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.62);
    o.connect(g).connect(this.bus);
    o.start(t); o.stop(t + 0.7);

    // 2) 타격 어택: 저역 노이즈 "퍽"
    const n = this._noiseSrc();
    const nf = this.ctx.createBiquadFilter();
    nf.type = "lowpass"; nf.frequency.value = 240;
    const ng = this.ctx.createGain();
    ng.gain.setValueAtTime(0.6 * vel, t);
    ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
    n.connect(nf).connect(ng).connect(this.bus);
    n.start(t); n.stop(t + 0.12);

    // 3) 통 울림 배음
    const o2 = this.ctx.createOscillator();
    o2.type = "triangle";
    o2.frequency.setValueAtTime(210 * det, t);
    o2.frequency.exponentialRampToValueAtTime(88 * det, t + 0.07);
    const g2 = this.ctx.createGain();
    g2.gain.setValueAtTime(0.22 * vel, t);
    g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
    o2.connect(g2).connect(this.bus);
    o2.start(t); o2.stop(t + 0.2);
  }

  /* 슬랩톤 "딱" — 테두리의 날카로운 타격 */
  playSlap(vel = 1) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const det = 0.94 + Math.random() * 0.12;

    // 1) 크랙: 밴드패스 노이즈
    const n1 = this._noiseSrc();
    const f1 = this.ctx.createBiquadFilter();
    f1.type = "bandpass"; f1.frequency.value = 2400 * det; f1.Q.value = 1.1;
    const g1 = this.ctx.createGain();
    g1.gain.setValueAtTime(0.85 * vel, t);
    g1.gain.exponentialRampToValueAtTime(0.0001, t + 0.085);
    n1.connect(f1).connect(g1).connect(this.bus);
    n1.start(t); n1.stop(t + 0.12);

    // 2) 고역 스냅(아주 짧게)
    const n2 = this._noiseSrc();
    const f2 = this.ctx.createBiquadFilter();
    f2.type = "highpass"; f2.frequency.value = 5200;
    const g2 = this.ctx.createGain();
    g2.gain.setValueAtTime(0.35 * vel, t);
    g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.045);
    n2.connect(f2).connect(g2).connect(this.bus);
    n2.start(t); n2.stop(t + 0.07);

    // 3) 나무 테두리 톤
    const o = this.ctx.createOscillator();
    o.type = "triangle";
    o.frequency.setValueAtTime(820 * det, t);
    o.frequency.exponentialRampToValueAtTime(460 * det, t + 0.045);
    const g3 = this.ctx.createGain();
    g3.gain.setValueAtTime(0.38 * vel, t);
    g3.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
    o.connect(g3).connect(this.bus);
    o.start(t); o.stop(t + 0.12);
  }

  /* 카운트다운 비프 — step 3·2·1, 0 = START */
  playCount(step) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const hi = step === 0;
    const o = this.ctx.createOscillator();
    o.type = "triangle";
    o.frequency.value = hi ? 1188 : 792;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(hi ? 0.5 : 0.35, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + (hi ? 0.5 : 0.18));
    o.connect(g).connect(this.bus);
    o.start(t); o.stop(t + (hi ? 0.55 : 0.22));
  }

  /* 박자 가이드 틱 (4박마다 악센트) */
  playTick(accent) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    o.type = "sine";
    o.frequency.value = accent ? 1320 : 990;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(accent ? 0.10 : 0.06, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
    o.connect(g).connect(this.bus);
    o.start(t); o.stop(t + 0.07);
  }

  /* Perfect 판정 보너스 스파클 */
  playSparkle() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    [1980, 2640].forEach((f, i) => {
      const o = this.ctx.createOscillator();
      o.type = "sine"; o.frequency.value = f;
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(i ? 0.05 : 0.08, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
      o.connect(g).connect(this.bus);
      o.start(t); o.stop(t + 0.11);
    });
  }

  play(tone, vel) {
    if (tone === "bass") this.playBass(vel);
    else this.playSlap(vel);
  }
}

/* ============================================================
   ParticleSystem — 타격 이펙트(링/스파크/먼지/플로팅 텍스트/글로우)
   ============================================================ */
class ParticleSystem {
  constructor() { this.items = []; }

  _push(p) {
    if (this.items.length >= CONFIG.particle.max) this.items.shift();
    this.items.push(p);
  }

  /* 베이스톤: 퍼지는 저주파 링 + 따뜻한 글로우 + 먼지 */
  emitBass(x, y, R) {
    this._push({ type: "glow", x, y, r: R * 0.30, life: 0, max: 0.26, color: "255,205,140" });
    for (let i = 0; i < 3; i++) {
      this._push({
        type: "ring", x, y,
        r: R * (0.05 + i * 0.03), vr: R * (1.35 + i * 0.45),
        life: 0, max: 0.5 + i * 0.1,
        color: "255,236,205", lw: Math.max(2, R * (0.022 - i * 0.005))
      });
    }
    for (let i = 0; i < 8; i++) {
      const a = Math.random() * Math.PI * 2, sp = R * (0.1 + Math.random() * 0.22);
      this._push({
        type: "dust", x, y,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - R * 0.18,
        size: 2 + Math.random() * 3, life: 0, max: 0.55 + Math.random() * 0.25,
        color: "255,228,185"
      });
    }
  }

  /* 슬랩톤: 날카로운 스파크 + 타이트한 링 + 밝은 플래시 */
  emitSlap(x, y, R) {
    this._push({ type: "glow", x, y, r: R * 0.16, life: 0, max: 0.18, color: "255,245,225" });
    this._push({
      type: "ring", x, y, r: R * 0.03, vr: R * 1.05,
      life: 0, max: 0.26, color: "255,255,255", lw: Math.max(2, R * 0.016)
    });
    for (let i = 0; i < 13; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = R * (0.85 + Math.random() * 1.1);
      this._push({
        type: "spark", x, y,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        len: R * (0.035 + Math.random() * 0.05),
        life: 0, max: 0.2 + Math.random() * 0.12,
        color: Math.random() < 0.5 ? "255,247,224" : "255,196,120"
      });
    }
  }

  /* "둥!" / "딱!" 플로팅 텍스트 */
  emitText(x, y, str, color, size) {
    this._push({ type: "text", x, y, vy: -size * 1.1, str, color, size, life: 0, max: 0.6 });
  }

  update(dt) {
    const arr = this.items;
    for (let i = arr.length - 1; i >= 0; i--) {
      const p = arr[i];
      p.life += dt;
      if (p.life >= p.max) { arr.splice(i, 1); continue; }
      if (p.type === "ring") p.r += p.vr * dt;
      else if (p.type === "spark" || p.type === "dust") {
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vx *= (1 - 3.2 * dt); p.vy *= (1 - 3.2 * dt);
        if (p.type === "dust") p.vy -= 18 * dt; // 먼지는 살짝 떠오름
      } else if (p.type === "text") {
        p.y += p.vy * dt; p.vy *= (1 - 2.5 * dt);
      }
    }
  }

  draw(ctx, layer) {
    /* layer: "under"(북면 위, 채 아래) / "over"(채 위) */
    for (const p of this.items) {
      const t = p.life / p.max;
      const a = 1 - t;
      if (layer === "under") {
        if (p.type === "glow") {
          const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * (1 + t * 0.4));
          g.addColorStop(0, `rgba(${p.color},${0.32 * a})`);
          g.addColorStop(1, `rgba(${p.color},0)`);
          ctx.fillStyle = g;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (1 + t * 0.4), 0, Math.PI * 2); ctx.fill();
        } else if (p.type === "ring") {
          ctx.strokeStyle = `rgba(${p.color},${0.55 * a})`;
          ctx.lineWidth = p.lw * (1 - t * 0.5);
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.stroke();
        } else if (p.type === "dust") {
          ctx.fillStyle = `rgba(${p.color},${0.4 * a})`;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        }
      } else if (layer === "over") {
        // 스파크만 채 위에 그림 (플로팅 텍스트는 _drawTexts 전용 패스에서 처리)
        if (p.type === "spark") {
          const vlen = Math.hypot(p.vx, p.vy) || 1;
          const nx = p.vx / vlen, ny = p.vy / vlen;
          ctx.strokeStyle = `rgba(${p.color},${0.85 * a})`;
          ctx.lineWidth = 2;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p.x - nx * p.len, p.y - ny * p.len);
          ctx.stroke();
        }
      }
    }
  }
}

/* ============================================================
   Stick — 난타채 1개
   - 휴지 자세: 채 끝이 북 중심 근처, 손잡이는 테두리 바깥(세모꼴)
   - 타격: 손잡이(그립)를 축으로 입력 지점을 향해 빠르게 회전/이동
   - 가까운 지점은 채의 중간(샤프트)이 닿는 것이 자연스러우므로
     채 끝이 정확히 입력점을 지나도록 직선을 맞춘다.
   ============================================================ */
class Stick {
  constructor(side) {
    this.side = side;            // -1: 왼채, +1: 오른채
    this.phase = "rest";         // rest | strike | hold | return
    this.t0 = 0;
    this.pose = { gx: 0, gy: 0, ang: 0 };     // 현재 자세(그립 위치 + 각도)
    this.startPose = null;       // 보간 시작 자세
    this.targetPose = null;      // 타격 목표 자세
    this.rest = { gx: 0, gy: 0, ang: 0 };
    this.len = 100; this.R = 100;
  }

  /* 화면 크기 변경 시 휴지 자세 재계산 */
  setLayout(cx, cy, R) {
    const C = CONFIG.stick;
    this.R = R;
    this.len = R * C.lengthRatio;
    // 채 끝(세모꼴 꼭짓점): 중심에서 살짝 벌어진 위쪽
    const tipX = cx + this.side * C.restTipGap * R;
    const tipY = cy + C.restTipY * R;
    // 기울기: 왼채는 ↗ 방향, 오른채는 ↖ 방향 (그립 → 채 끝 벡터 기준)
    const a = (Math.PI / 180) * C.restAngleDeg;
    const ang = this.side === -1 ? -a : -(Math.PI - a);
    this.rest = {
      gx: tipX - Math.cos(ang) * this.len,
      gy: tipY - Math.sin(ang) * this.len,
      ang
    };
    // 진행 중인 동작은 초기화
    this.phase = "rest";
    this.pose = { ...this.rest };
  }

  /* (px, py) 지점 타격 */
  strike(px, py, now) {
    const C = CONFIG.stick;
    const g0 = this.rest;
    const dx = px - g0.gx, dy = py - g0.gy;
    const d = Math.hypot(dx, dy) || 1;

    // 휴지 각도에서 너무 크게 벗어나지 않도록 회전 제한
    let ang = Math.atan2(dy, dx);
    let dAng = (ang - g0.ang) % (Math.PI * 2);
    if (dAng > Math.PI) dAng -= Math.PI * 2;
    if (dAng < -Math.PI) dAng += Math.PI * 2;
    const maxSwing = (Math.PI / 180) * C.maxSwingDeg;
    dAng = clamp(dAng, -maxSwing, maxSwing);
    ang = g0.ang + dAng;

    // 먼 지점은 그립을 입력점 방향으로 밀어 채 끝이 닿게 함
    const dirX = Math.cos(ang), dirY = Math.sin(ang);
    const slide = d > this.len ? Math.min(d - this.len, this.len * 0.9) : 0;

    this.startPose = { ...this.pose };
    this.targetPose = { gx: g0.gx + dirX * slide, gy: g0.gy + dirY * slide, ang };
    this.phase = "strike";
    this.t0 = now;
  }

  update(now) {
    const C = CONFIG.stick;
    if (this.phase === "strike") {
      const t = (now - this.t0) / C.strikeMs;
      if (t >= 1) {
        this.pose = { ...this.targetPose };
        this.phase = "hold"; this.t0 = now;
      } else {
        const e = easeOutCubic(t);
        this.pose.gx = lerp(this.startPose.gx, this.targetPose.gx, e);
        this.pose.gy = lerp(this.startPose.gy, this.targetPose.gy, e);
        this.pose.ang = lerpAngle(this.startPose.ang, this.targetPose.ang, e);
      }
    } else if (this.phase === "hold") {
      if (now - this.t0 >= C.holdMs) {
        this.startPose = { ...this.pose };
        this.phase = "return"; this.t0 = now;
      }
    } else if (this.phase === "return") {
      const t = (now - this.t0) / C.returnMs;
      if (t >= 1) {
        this.pose = { ...this.rest };
        this.phase = "rest";
      } else {
        const e = easeInOutQuad(t);
        this.pose.gx = lerp(this.startPose.gx, this.rest.gx, e);
        this.pose.gy = lerp(this.startPose.gy, this.rest.gy, e);
        this.pose.ang = lerpAngle(this.startPose.ang, this.rest.ang, e);
      }
    }
  }

  /* 타격 진행 중 살짝 들리는 효과(그림자 거리용) */
  get lift() {
    const C = CONFIG.stick;
    const now = performance.now();
    if (this.phase === "strike") {
      const t = clamp((now - this.t0) / C.strikeMs, 0, 1);
      return Math.sin(t * Math.PI) * 0.55;
    }
    if (this.phase === "return") {
      const t = clamp((now - this.t0) / C.returnMs, 0, 1);
      return Math.sin(t * Math.PI) * 0.18;
    }
    return 0;
  }

  draw(ctx) {
    const { gx, gy, ang } = this.pose;
    const L = this.len;
    const w0 = this.R * 0.052;   // 손잡이 굵기
    const w1 = this.R * 0.034;   // 채 끝 굵기
    const liftPx = this.lift * this.R * 0.12;

    const shape = () => {
      ctx.beginPath();
      ctx.moveTo(0, -w0 / 2);
      ctx.lineTo(L - w1 / 2, -w1 / 2);
      ctx.arc(L - w1 / 2, 0, w1 / 2, -Math.PI / 2, Math.PI / 2);
      ctx.lineTo(0, w0 / 2);
      ctx.arc(0, 0, w0 / 2, Math.PI / 2, Math.PI * 1.5);
      ctx.closePath();
    };

    // 1) 그림자 (들릴수록 멀어짐)
    ctx.save();
    ctx.translate(gx + 2 + liftPx * 0.7, gy + 3 + liftPx);
    ctx.rotate(ang);
    shape();
    ctx.fillStyle = "rgba(40,24,10,0.18)";
    ctx.fill();
    ctx.restore();

    // 2) 채 본체 (나무 질감 그라데이션)
    ctx.save();
    ctx.translate(gx, gy);
    ctx.rotate(ang);
    const grad = ctx.createLinearGradient(0, 0, L, 0);
    grad.addColorStop(0, "#6b4c30");
    grad.addColorStop(0.45, "#8a6a48");
    grad.addColorStop(1, "#9c7c58");
    shape();
    ctx.fillStyle = grad;
    ctx.fill();
    // 윗면 하이라이트
    ctx.strokeStyle = "rgba(255,244,224,0.28)";
    ctx.lineWidth = w1 * 0.32;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(w0 * 0.8, -w0 * 0.16);
    ctx.lineTo(L - w1 * 1.4, -w1 * 0.18);
    ctx.stroke();
    // 손잡이 끝 마감
    ctx.fillStyle = "rgba(60,38,20,0.55)";
    ctx.beginPath();
    ctx.arc(0, 0, w0 * 0.34, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}
