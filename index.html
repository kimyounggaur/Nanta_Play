/* ---------- 패턴 → 노트 변환 ---------- */
function beatStepOf(unit) {
  return unit === "quarter" ? 1 : unit === "sixteenth" ? 0.25 : 0.5;
}

/* 리듬 데이터의 bars를 시간순 노트 배열로 변환 + 간격 자동 보정 */
function generateNotes(rhythm, bpm = rhythm.bpm) {
  const step = beatStepOf(rhythm.patternUnit);
  const beatMs = 60000 / bpm;
  const notes = [];
  let idx = 0, slapSide = -1;
  let beatCursor = 4; // 카운트다운 직후 첫 노트가 너무 빨리 나오지 않게 4박 여유

  for (let r = 0; r < rhythm.repeat; r++) {
    for (const bar of rhythm.bars) {
      for (let i = 0; i < bar.length; i++) {
        const tk = bar[i];
        if (tk === "B" || tk === "S") {
          const tone = tk === "B" ? "bass" : "slap";
          let side = 0;
          if (tone === "slap") { slapSide = -slapSide; side = slapSide; } // 딱은 좌/우 레인 번갈아
          const beat = beatCursor + i * step;
          notes.push({ id: idx++, tone, side, beat, hitTimeMs: beat * beatMs, status: "pending" });
        }
      }
      beatCursor += bar.length * step;
    }
  }

  // 간격 검증 + 자동 보정 — 노트 겹침 절대 금지
  const diff = DIFFICULTY_CONFIG[rhythm.difficulty];
  notes.sort((a, b) => a.hitTimeMs - b.hitTimeMs);
  let lastAny = -Infinity;
  const lastTone = { bass: -Infinity, slap: -Infinity };
  for (const n of notes) {
    let shift = 0;
    const gapAny = n.hitTimeMs - lastAny;
    const gapTone = n.hitTimeMs - lastTone[n.tone];
    if (gapAny < diff.minGapMs) shift = Math.max(shift, diff.minGapMs - gapAny);
    if (gapTone < diff.minToneGapMs) shift = Math.max(shift, diff.minToneGapMs - gapTone);
    if (shift > 0) { n.hitTimeMs += shift; n.autoShifted = true; }
    lastAny = n.hitTimeMs;
    lastTone[n.tone] = n.hitTimeMs;
  }
  return notes;
}

/* ============================================================
   Settings — 설정값 (localStorage 영속)
   ============================================================ */
class Settings {
  constructor() {
    this.key = "nanta.settings.v1";
    const def = { volume: 0.9, noteSpeed: "normal", offsetMs: 0, tick: true, vibrate: true };
    let d = def;
    try { d = Object.assign({}, def, JSON.parse(localStorage.getItem(this.key) || "{}")); } catch { /* 무시 */ }
    this.data = d;
  }
  save() {
    try { localStorage.setItem(this.key, JSON.stringify(this.data)); } catch { /* 무시 */ }
  }
}

/* ============================================================
   ProgressManager — 리듬별 최고 기록 (localStorage 영속)
   ============================================================ */
function betterGrade(a, b) {
  if (!a) return b;
  if (!b) return a;
  return GRADE_ORDER.indexOf(a) <= GRADE_ORDER.indexOf(b) ? a : b;
}

class ProgressManager {
  constructor() {
    this.key = "nanta.progress.v1";
    let d = { lastSelectedRhythmId: null, records: {} };
    try {
      const raw = localStorage.getItem(this.key);
      if (raw) d = Object.assign(d, JSON.parse(raw));
    } catch { /* 무시 */ }
    this.data = d;
  }
  _save() {
    try { localStorage.setItem(this.key, JSON.stringify(this.data)); } catch { /* 무시 */ }
  }
  getRecord(id) { return this.data.records[id] || null; }
  get lastSelected() { return this.data.lastSelectedRhythmId; }
  setLastSelected(id) { this.data.lastSelectedRhythmId = id; this._save(); }

  /* 결과 반영 — 갱신 여부 플래그 반환 */
  update(id, result) {
    const prev = this.getRecord(id);
    const flags = {
      newScore: !prev || result.score > prev.bestScore,
      newAcc:   !prev || result.accuracy > prev.bestAccuracy,
      newCombo: !prev || result.maxCombo > prev.bestCombo
    };
    this.data.records[id] = {
      plays: (prev ? prev.plays : 0) + 1,
      bestScore: Math.max(prev ? prev.bestScore : 0, result.score),
      bestCombo: Math.max(prev ? prev.bestCombo : 0, result.maxCombo),
      bestAccuracy: Math.max(prev ? prev.bestAccuracy : 0, result.accuracy),
      bestGrade: betterGrade(prev && prev.bestGrade, result.grade),
      lastPlayedAt: new Date().toISOString(),
      toneStats: result.toneStats
    };
    this._save();
    return flags;
  }
}

/* ============================================================
   RhythmLibrary — 리듬 조회/통계/추천
   ============================================================ */
class RhythmLibrary {
  constructor() {
    this.list = RHYTHM_LIBRARY_DATA;
    this._cache = {};
  }
  byId(id) { return this.list.find(r => r.id === id) || null; }
  byDiff(d) { return d === "all" ? this.list : this.list.filter(r => r.difficulty === d); }

  /* 노트 수/플레이 시간 (생성 결과 캐시) */
  stats(rhythm) {
    if (!this._cache[rhythm.id]) {
      const notes = generateNotes(rhythm);
      const last = notes.length ? notes[notes.length - 1].hitTimeMs : 0;
      this._cache[rhythm.id] = { count: notes.length, seconds: Math.round((last + 2200) / 1000) };
    }
    return this._cache[rhythm.id];
  }

  /* 결과 기반 다음 추천 리듬 */
  recommendNext(curId, result, progress) {
    const cur = this.byId(curId);
    if (!cur || !result || result.accuracy < 65) return curId; // 재도전 추천
    const order = ["intro", "beginner", "intermediate", "advanced"];
    if (result.accuracy < 82) {
      const same = this.list.filter(r => r.difficulty === cur.difficulty && r.id !== curId);
      const un = same.find(r => !progress.getRecord(r.id));
      return (un || same[0] || cur).id;
    }
    const ni = order.indexOf(cur.difficulty) + 1;
    if (ni < order.length) {
      const next = this.list.filter(r => r.difficulty === order[ni]);
      const un = next.find(r => !progress.getRecord(r.id));
      if (next.length) return (un || next[0]).id;
    }
    const anyUn = this.list.find(r => !progress.getRecord(r.id));
    return (anyUn || cur).id;
  }
}

/* ============================================================
   PreviewPlayer — 선택 화면 미리듣기 (앞 2마디)
   ============================================================ */
class PreviewPlayer {
  constructor(app, ui) {
    this.app = app;
    this.ui = ui;
    this.timers = [];
    this.playing = false;
    this._raf = 0;
    this._t0 = 0;
    this._dur = 0;
  }

  toggle(rhythm) { this.playing ? this.stop() : this.play(rhythm); }

  play(rhythm) {
    this.stop();
    this.app.audio.ensure();
    const step = beatStepOf(rhythm.patternUnit);
    const beatMs = 60000 / rhythm.bpm;
    const bars = rhythm.bars.slice(0, 2);
    let beat = 0;
    const events = [];
    for (const bar of bars) {
      for (let i = 0; i < bar.length; i++) {
        const tk = bar[i];
        if (tk === "B" || tk === "S") events.push({ t: (beat + i * step) * beatMs, tone: tk === "B" ? "bass" : "slap" });
      }
      beat += bar.length * step;
    }
    this._dur = beat * beatMs + 250;
    this.playing = true;
    this._t0 = performance.now();
    for (const ev of events) {
      this.timers.push(setTimeout(() => { if (this.playing) this.app.audio.play(ev.tone, 0.7); }, ev.t));
    }
    this.timers.push(setTimeout(() => this.stop(), this._dur));
    this.ui.setPreviewLabel(true);
    // 재생 커서 애니메이션
    const tick = () => {
      if (!this.playing) return;
      const p = Math.min(1, (performance.now() - this._t0) / this._dur);
      this.ui.drawPattern(p);
      this._raf = requestAnimationFrame(tick);
    };
    this._raf = requestAnimationFrame(tick);
  }

  stop() {
    this.timers.forEach(t => clearTimeout(t));
    this.timers = [];
    if (this._raf) { cancelAnimationFrame(this._raf); this._raf = 0; }
    const was = this.playing;
    this.playing = false;
    if (was) this.ui.drawPattern(0);
    this.ui.setPreviewLabel(false);
  }
}

/* ============================================================
   RhythmSelectUI — 난이도별 리듬 선택 화면
   ============================================================ */
class RhythmSelectUI {
  constructor(app) {
    this.app = app;
    this.el = document.getElementById("rhythmSelect");
    this.cardsEl = document.getElementById("rsCards");
    this.detailEl = document.getElementById("rsDetail");
    this.filter = "all";
    this.selectedId = null;
    this.preview = new PreviewPlayer(app, this);

    // 난이도 탭
    document.getElementById("rsTabs").addEventListener("click", e => {
      const b = e.target.closest("button[data-diff]");
      if (!b) return;
      this.filter = b.dataset.diff;
      document.querySelectorAll("#rsTabs button").forEach(x => x.classList.toggle("active", x === b));
      this.renderCards();
    });
    // 카드 선택 (이벤트 위임)
    this.cardsEl.addEventListener("click", e => {
      const card = e.target.closest(".r-card");
      if (card) this.select(card.dataset.id);
    });
    // 뒤로 → 시작 화면
    document.getElementById("rsBackBtn").addEventListener("click", () => {
      this.close();
      document.getElementById("introOverlay").classList.remove("hidden");
      this.app.setMode("free");
    });
  }

  open() {
    const app = this.app;
    this.el.classList.remove("hidden");
    const last = app.progress.lastSelected;
    this.selectedId = (last && app.library.byId(last)) ? last : app.library.list[0].id;
    // 선택 리듬이 현재 필터 밖이면 전체 탭으로
    if (this.filter !== "all" && app.library.byId(this.selectedId).difficulty !== this.filter) {
      this.filter = "all";
      document.querySelectorAll("#rsTabs button").forEach(x => x.classList.toggle("active", x.dataset.diff === "all"));
    }
    this.renderCards();
    this.renderDetail();
  }

  close() {
    this.preview.stop();
    this.el.classList.add("hidden");
  }

  select(id) {
    if (this.selectedId !== id) this.preview.stop();
    this.selectedId = id;
    this.app.progress.setLastSelected(id);
    this.renderCards();
    this.renderDetail();
  }

  /* 아직 기록이 없는 첫 리듬 = 추천 */
  _recommendedId() {
    const un = this.app.library.list.find(r => !this.app.progress.getRecord(r.id));
    return un ? un.id : null;
  }

  renderCards() {
    const app = this.app;
    const list = app.library.byDiff(this.filter);
    const recoId = this._recommendedId();
    this.cardsEl.innerHTML = list.map(r => {
      const d = DIFFICULTY_CONFIG[r.difficulty];
      const st = app.library.stats(r);
      const rec = app.progress.getRecord(r.id);
      const recText = rec
        ? `최고 ${rec.bestGrade} ${Math.round(rec.bestAccuracy)}% · ${rec.bestScore.toLocaleString()}점`
        : "기록 없음";
      return `
      <button class="r-card ${r.id === this.selectedId ? "selected" : ""}" data-id="${r.id}">
        ${r.id === recoId ? `<span class="reco-badge">추천</span>` : ""}
        <div class="r-top">
          <span class="diff-badge" style="background:${d.color}">${d.badge} ${d.label}</span>
          <span class="stars">${"★".repeat(r.star)}${"☆".repeat(5 - r.star)}</span>
        </div>
        <h3>${r.titleKo} ${rec ? `<span class="done-check">✓</span>` : ""}</h3>
        <div class="en">${r.title}</div>
        <p class="desc">${r.description}</p>
        <div class="r-meta"><span>BPM ${r.bpm}</span><span>${st.seconds}초</span><span>${st.count}노트</span></div>
        <div class="r-rec">${recText}</div>
      </button>`;
    }).join("");
  }

  renderDetail() {
    const app = this.app;
    const r = app.library.byId(this.selectedId);
    if (!r) { this.detailEl.innerHTML = ""; return; }
    const d = DIFFICULTY_CONFIG[r.difficulty];
    const st = app.library.stats(r);
    const rec = app.progress.getRecord(r.id);
    this.detailEl.innerHTML = `
      <span class="diff-badge" style="background:${d.color}">${d.badge} ${d.label}</span>
      <h3>${r.titleKo}</h3>
      <div class="en">${r.title}</div>
      <div class="d-grid">
        <div><strong>${r.bpm}</strong><span>BPM</span></div>
        <div><strong>${st.seconds}</strong><span>초</span></div>
        <div><strong>${st.count}</strong><span>노트</span></div>
        <div><strong>${"★".repeat(r.star)}</strong><span>난이도</span></div>
      </div>
      <p class="desc">${r.description}</p>
      <h4>🎯 학습 목표</h4>
      <p class="desc">${r.learningGoal}</p>
      <h4>💡 연습 팁</h4>
      <ul>${r.tips.map(t => `<li>${t}</li>`).join("")}</ul>
      <h4>🎼 패턴 미리보기 (2마디)</h4>
      <canvas id="rsPreviewCanvas" width="320" height="116"></canvas>
      <h4>🏆 최고 기록</h4>
      <div class="record-line">${rec
        ? `${rec.bestGrade} 등급 · 정확도 ${rec.bestAccuracy.toFixed(1)}% · ${rec.bestScore.toLocaleString()}점 · 콤보 ${rec.bestCombo} · ${rec.plays}회`
        : "아직 기록이 없어요. 첫 도전!"}</div>
      <div class="rs-actions">
        <button id="rsPreviewBtn" class="btn-secondary">▶ 미리듣기</button>
        <div class="btn-row two" style="margin-top:0">
          <button id="rsPracticeBtn" class="btn-secondary">연습하기</button>
          <button id="rsStartBtn" class="btn-primary">이 리듬으로 시작</button>
        </div>
      </div>`;
    document.getElementById("rsPreviewBtn").addEventListener("click", () => this.preview.toggle(r));
    document.getElementById("rsPracticeBtn").addEventListener("click", () => this.app.game.start(r.id, "practice"));
    document.getElementById("rsStartBtn").addEventListener("click", () => this.app.game.start(r.id, "normal"));
    this.drawPattern(0);
  }

  setPreviewLabel(playing) {
    const b = document.getElementById("rsPreviewBtn");
    if (b) b.textContent = playing ? "⏹ 정지" : "▶ 미리듣기";
  }

  /* 미니 패턴 미리보기 캔버스 (둥/딱 2행 + 재생 커서) */
  drawPattern(progress = 0) {
    const cv = document.getElementById("rsPreviewCanvas");
    const r = this.app.library.byId(this.selectedId);
    if (!cv || !r) return;
    const ctx = cv.getContext("2d");
    const W = cv.width, H = cv.height;
    ctx.clearRect(0, 0, W, H);
    const padL = 46, padR = 14;
    const rows = { slap: H * 0.30, bass: H * 0.72 };
    const step = beatStepOf(r.patternUnit);
    const bars = r.bars.slice(0, 2);
    const maxBeat = bars.reduce((s, b) => s + b.length * step, 0);
    ctx.font = "900 13px Pretendard, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif";
    ctx.textBaseline = "middle";
    // 행 라인 + 라벨
    for (const [tone, y] of Object.entries(rows)) {
      ctx.strokeStyle = "rgba(42,28,16,0.12)";
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
      ctx.fillStyle = tone === "bass" ? "#b35a17" : "#c0392b";
      ctx.fillText(tone === "bass" ? "둥" : "딱", 12, y);
    }
    // 마디 구분선
    let acc = 0;
    for (const b of bars) {
      const x = padL + (acc / maxBeat) * (W - padL - padR);
      ctx.strokeStyle = "rgba(42,28,16,0.10)";
      ctx.beginPath(); ctx.moveTo(x, 12); ctx.lineTo(x, H - 12); ctx.stroke();
      acc += b.length * step;
    }
    // 노트 점
    let beat = 0;
    for (const bar of bars) {
      for (let i = 0; i < bar.length; i++) {
        const tk = bar[i];
        if (tk === "B" || tk === "S") {
          const x = padL + ((beat + i * step) / maxBeat) * (W - padL - padR);
          if (tk === "B") {
            ctx.fillStyle = "#b35a17";
            ctx.beginPath(); ctx.arc(x, rows.bass, 7, 0, Math.PI * 2); ctx.fill();
          } else {
            ctx.strokeStyle = "#c0392b"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(x, rows.slap, 6, 0, Math.PI * 2); ctx.stroke();
            ctx.lineWidth = 1;
          }
        }
      }
      beat += bar.length * step;
    }
    // 재생 커서
    if (progress > 0) {
      const x = padL + progress * (W - padL - padR);
      ctx.strokeStyle = "rgba(42,28,16,0.55)";
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x, 8); ctx.lineTo(x, H - 8); ctx.stroke();
    }
  }
}

/* ============================================================
   RhythmGame — 노트 낙하 리듬 게임 본체
   - 상태: idle | countdown | playing | paused | result
   - 시간은 performance.now() 기반 gameTime 하나로 통일
     (카운트다운 = gameTime −3000~0ms 구간, 일시정지 시간은 보정)
   ============================================================ */
class RhythmGame {
  constructor(app) {
    this.app = app;
    this.state = "idle";
    this.rhythm = null;
    this.mode = "normal";       // normal | practice
    this.notes = [];
    this.headIdx = 0;           // 자동 Miss 스캔 포인터
    this.win = null;            // 판정창 {perfect, great, good, miss}
    this.approach = 2800;       // 노트 낙하 시간
    this.beatMs = 600;
    this.durationMs = 0;
    this.sc = null;             // 점수판
    this._before = "playing";
    this._lastBeat = -1;
    this._countStep = 4;
    this._startFlashT = -1;
    this._comboPopT = -9999;
    this._endT = -1;
    this._pausedAt = 0;
    this._pausedTotal = 0;
    this._t0 = 0;
    this._lastProgT = 0;

    // 일시정지 모달 버튼
    document.getElementById("resumeBtn").addEventListener("click", () => this.resume());
    document.getElementById("restartBtn").addEventListener("click", () => { if (this.rhythm) this.start(this.rhythm.id, this.mode); });
    document.getElementById("quitBtn").addEventListener("click", () => this.quitToSelect());
  }

  /* ---------- 게임 시작 ---------- */
  start(rhythmId, mode = "normal") {
    const app = this.app;
    const rhythm = app.library.byId(rhythmId);
    if (!rhythm) return;
    app.rsUI.close();
    app.progress.setLastSelected(rhythmId);

    this.rhythm = rhythm;
    this.mode = mode;
    const diff = DIFFICULTY_CONFIG[rhythm.difficulty];
    const pr = mode === "practice";
    const bpm = rhythm.bpm * (pr ? PRACTICE_MOD.bpm : 1);
    this.beatMs = 60000 / bpm;
    this.approach = diff.approachMs * NOTE_SPEED_MULT[app.settings.data.noteSpeed] * (pr ? PRACTICE_MOD.approach : 1);
    const wm = pr ? PRACTICE_MOD.window : 1;
    this.win = { perfect: diff.perfect * wm, great: diff.great * wm, good: diff.good * wm, miss: diff.miss * wm };

    this.notes = generateNotes(rhythm, bpm);
    const last = this.notes.length ? this.notes[this.notes.length - 1].hitTimeMs : 0;
    this.durationMs = last + 2200;
    this.headIdx = 0;
    this.sc = {
      score: 0, combo: 0, maxCombo: 0,
      counts: { perfect: 0, great: 0, good: 0, miss: 0 },
      tone: { bass: { hit: 0, total: 0 }, slap: { hit: 0, total: 0 } },
      weighted: 0, judged: 0, total: this.notes.length
    };
    this.notes.forEach(n => this.sc.tone[n.tone].total++);
    this._lastBeat = -1;
    this._countStep = 4;
    this._startFlashT = -1;
    this._endT = -1;
    this._pausedTotal = 0;
    this._t0 = performance.now();
    this.state = "countdown";

    document.getElementById("resultModal").classList.add("hidden");
    document.getElementById("pauseModal").classList.add("hidden");
    app.setMode("game");
    if (pr) {
      document.getElementById("bottomHint").innerHTML =
        `🌱 연습 모드 · 판정이 더 너그럽고 기록은 저장되지 않아요`;
    }
    app.audio.ensure();
    this._updateHud();
  }

  gameTime(now = performance.now()) {
    return now - this._t0 - 3000 - this._pausedTotal;
  }

  /* ---------- 일시정지 ---------- */
  togglePause() {
    if (this.state === "playing" || this.state === "countdown") {
      this._before = this.state;
      this.state = "paused";
      this._pausedAt = performance.now();
      document.getElementById("pauseModal").classList.remove("hidden");
    } else if (this.state === "paused") {
      this.resume();
    }
  }
  resume() {
    if (this.state !== "paused") return;
    this._pausedTotal += performance.now() - this._pausedAt;
    this.state = this._before || "playing";
    document.getElementById("pauseModal").classList.add("hidden");
  }
  quitToSelect() {
    this.state = "idle";
    document.getElementById("pauseModal").classList.add("hidden");
    document.getElementById("resultModal").classList.add("hidden");
    this.app.rsUI.open();
  }

  /* ---------- 프레임 갱신 (메인 루프에서 호출) ---------- */
  update(now) {
    if (this.state === "idle" || this.state === "paused" || this.state === "result") return;
    const app = this.app;
    const gt = this.gameTime(now);

    if (this.state === "countdown") {
      const step = Math.max(0, Math.ceil(-gt / 1000)); // 3 → 2 → 1 → 0(START)
      if (step !== this._countStep) {
        this._countStep = step;
        if (step > 0) {
          app.audio.playCount(step);
          app.particles.emitSlap(app.cx, app.h * 0.40, app.R * 0.8);
        } else {
          app.audio.playCount(0);
          app.particles.emitBass(app.cx, app.h * 0.40, app.R);
          app.particles.emitSlap(app.cx, app.h * 0.40, app.R);
          this._startFlashT = now;
          this.state = "playing";
        }
      }
      return;
    }

    // ----- playing -----
    // 박자 가이드 틱
    if (app.settings.data.tick && gt >= 0) {
      const bi = Math.floor(gt / this.beatMs);
      if (bi > this._lastBeat) { this._lastBeat = bi; app.audio.playTick(bi % 4 === 0); }
    }
    // 자동 Miss (판정창을 지나친 노트)
    const offset = app.settings.data.offsetMs;
    while (this.headIdx < this.notes.length) {
      const n = this.notes[this.headIdx];
      if (n.status !== "pending") { this.headIdx++; continue; }
      if (gt - (n.hitTimeMs + offset) > this.win.miss) {
        this._miss(n, gt);
        this.headIdx++;
      } else break;
    }
    // 진행 바 (200ms 간격으로만 DOM 갱신)
    if (now - this._lastProgT > 200) {
      this._lastProgT = now;
      const pct = clamp(gt / this.durationMs, 0, 1) * 100;
      document.getElementById("progressFill").style.width = pct + "%";
    }
    // 종료 판단
    if (this._endT < 0 && this.sc.judged >= this.sc.total) this._endT = now + 900;
    if (this._endT < 0 && gt > this.durationMs) this._endT = now + 400;
    if (this._endT > 0 && now >= this._endT) this._finish();
  }

  /* ---------- 입력 판정 (NantaApp.handleHit에서 호출) ---------- */
  handleInput(tone) {
    if (this.state !== "playing") return;
    const gt = this.gameTime();
    if (gt < 0) return; // START 전에는 판정하지 않음
    const offset = this.app.settings.data.offsetMs;

    // 판정창 안의 가장 가까운 같은 톤 노트 찾기 (시간순 정렬 활용)
    let best = null, bestAbs = Infinity;
    for (const n of this.notes) {
      if (n.status !== "pending" || n.tone !== tone) continue;
      const delta = gt - n.hitTimeMs - offset;
      if (delta < -this.win.miss) break; // 이후 노트는 모두 미래
      const abs = Math.abs(delta);
      if (abs <= this.win.miss && abs < bestAbs) { best = n; bestAbs = abs; }
    }
    if (!best) return; // 빈 타격 — 소리만 나고 감점 없음

    let kind;
    if (bestAbs <= this.win.perfect) kind = "perfect";
    else if (bestAbs <= this.win.great) kind = "great";
    else if (bestAbs <= this.win.good) kind = "good";
    else { this._miss(best, gt); return; } // good~miss 사이 = 너무 이르거나 늦음

    best.status = "hit";
    const sc = this.sc;
    sc.judged++;
    sc.counts[kind]++;
    sc.tone[tone].hit++;
    sc.weighted += ACC_WEIGHT[kind];
    sc.combo++;
    sc.maxCombo = Math.max(sc.maxCombo, sc.combo);
    this._comboPopT = performance.now();
    // 콤보 보너스
    let bonus = 1;
    if (sc.combo >= 50) bonus = 1.15;
    else if (sc.combo >= 30) bonus = 1.10;
    else if (sc.combo >= 10) bonus = 1.05;
    sc.score += Math.round(SCORE_TABLE[kind] * bonus);

    // 노트 폭발 이펙트 + 판정 텍스트
    const app = this.app;
    const x = this._laneX(best);
    if (kind === "perfect") app.audio.playSparkle();
    if (tone === "bass") app.particles.emitBass(x, app.judgeY, app.R * 0.8);
    else app.particles.emitSlap(x, app.judgeY, app.R * 0.8);
    this._judgeText(best, kind);
    this._updateHud();
  }

  _miss(note, gt) {
    note.status = "miss";
    note.missAt = gt;
    this.sc.counts.miss++;
    this.sc.judged++;
    this.sc.combo = 0;
    this._judgeText(note, "miss");
    this._updateHud();
  }

  _laneX(note) {
    const L = this.app.laneX;
    return note.tone === "bass" ? L.bass : (note.side < 0 ? L.slapL : L.slapR);
  }

  _judgeText(note, kind) {
    const s = JUDGE_STYLE[kind];
    this.app.particles.emitText(this._laneX(note), this.app.judgeY - 46, s.t, s.c, kind === "miss" ? 17 : 20);
  }

  _updateHud() {
    const sc = this.sc;
    if (!sc) return;
    document.getElementById("scoreVal").textContent = sc.score.toLocaleString();
    const acc = sc.judged ? (sc.weighted / sc.judged) * 100 : 100;
    document.getElementById("accVal").textContent = acc.toFixed(0) + "%";
  }

  _toneRate(t) {
    const s = this.sc.tone[t];
    return { hit: s.hit, total: s.total, rate: s.total ? (s.hit / s.total) * 100 : 100 };
  }

  /* ---------- 종료 → 결과 ---------- */
  _finish() {
    this.state = "result";
    const sc = this.sc;
    const acc = sc.total ? (sc.weighted / sc.total) * 100 : 0;
    const grade = GRADES.find(g => acc >= g.min).g;
    const result = {
      score: sc.score, maxCombo: sc.maxCombo, accuracy: acc, grade,
      counts: { ...sc.counts },
      toneStats: { bass: this._toneRate("bass"), slap: this._toneRate("slap") }
    };
    let flags = null;
    if (this.mode !== "practice") flags = this.app.progress.update(this.rhythm.id, result);
    this._showResult(result, flags);
  }

  _showResult(result, flags) {
    const app = this.app;
    const r = this.rhythm;
    const d = DIFFICULTY_CONFIG[r.difficulty];
    const practice = this.mode === "practice";
    const tb = result.toneStats.bass, ts = result.toneStats.slap;
    let weakLine = "";
    if (tb.total >= 4 && ts.total >= 4 && Math.abs(tb.rate - ts.rate) >= 8) {
      const weak = tb.rate < ts.rate ? "둥(베이스톤)" : "딱(슬랩톤)";
      weakLine = `<br>${weak} 타이밍을 조금 더 연습해보세요.`;
    }
    const recId = app.library.recommendNext(r.id, result, app.progress);
    const recR = app.library.byId(recId) || r;
    const recCopy = result.accuracy >= 95 ? "완벽해요! 다음 난이도에 도전해볼까요?"
      : result.accuracy >= 82 ? "좋아요. 다음 리듬으로 그루브를 넓혀봐요."
      : result.accuracy >= 65 ? "기본기가 잡혔어요. 같은 난이도의 다른 리듬은 어때요?"
      : "같은 리듬을 연습 모드로 한 번 더 다져봐요.";
    const nb = k => (!practice && flags && flags[k]) ? `<span class="new-best">NEW</span>` : "";

    document.getElementById("resultBody").innerHTML = `
      <div class="res-rhythm">${d.badge} ${r.titleKo} · ${d.label}${practice ? " · 연습 모드" : ""}</div>
      <div class="grade-circle" style="background:${GRADE_COLOR[result.grade]}">${result.grade}</div>
      <div class="res-score">${result.score.toLocaleString()}점${nb("newScore")}</div>
      <div class="res-grid">
        <div style="color:#e8a013"><strong>${result.counts.perfect}</strong><span>PERFECT</span></div>
        <div style="color:#3f9d4e"><strong>${result.counts.great}</strong><span>GREAT</span></div>
        <div style="color:#4a7bd0"><strong>${result.counts.good}</strong><span>GOOD</span></div>
        <div style="color:#c0392b"><strong>${result.counts.miss}</strong><span>MISS</span></div>
      </div>
      <div class="res-grid" style="grid-template-columns:1fr 1fr">
        <div><strong>${result.accuracy.toFixed(1)}%${nb("newAcc")}</strong><span>정확도</span></div>
        <div><strong>${result.maxCombo}${nb("newCombo")}</strong><span>최고 콤보</span></div>
      </div>
      <div class="tone-rates">
        <div class="tone-rate">둥 (베이스톤) ${Math.round(tb.rate)}% <span style="color:#a08866">(${tb.hit}/${tb.total})</span>
          <div class="bar"><i style="width:${tb.rate}%;background:#b35a17"></i></div></div>
        <div class="tone-rate">딱 (슬랩톤) ${Math.round(ts.rate)}% <span style="color:#a08866">(${ts.hit}/${ts.total})</span>
          <div class="bar"><i style="width:${ts.rate}%;background:#c0392b"></i></div></div>
      </div>
      <p class="res-feedback">${GRADE_FEEDBACK[result.grade]}${weakLine}</p>
      ${practice ? `<p class="res-reco">연습 모드 기록은 저장되지 않아요.</p>` : ""}
      <p class="res-reco">다음 추천: <b>${recR.titleKo}</b> — ${recCopy}</p>
      <div class="btn-row two">
        <button id="resRetry" class="btn-primary">다시 하기</button>
        <button id="resSelect" class="btn-secondary">다른 리듬</button>
      </div>
      <div class="btn-row two">
        <button id="resPractice" class="btn-secondary">${practice ? "일반 모드로" : "연습 모드"}</button>
        <button id="resHome" class="btn-secondary">처음으로</button>
      </div>`;
    document.getElementById("resultModal").classList.remove("hidden");
    document.getElementById("resRetry").addEventListener("click", () => this.start(r.id, this.mode));
    document.getElementById("resSelect").addEventListener("click", () => this.quitToSelect());
    document.getElementById("resPractice").addEventListener("click", () => this.start(r.id, practice ? "normal" : "practice"));
    document.getElementById("resHome").addEventListener("click", () => {
      this.state = "idle";
      document.getElementById("resultModal").classList.add("hidden");
      document.getElementById("introOverlay").classList.remove("hidden");
      app.setMode("free");
    });
  }

  /* ---------- 게임 화면 렌더링 (레인/노트/판정선/카운트다운) ---------- */
  render(ctx) {
    if (this.state === "idle") return;
    const app = this.app;
    const { judgeY, laneX, cx } = app;
    if (!laneX) return;
    const nr = app.noteR();
    const now = performance.now();
    const gt = this.state === "paused" ? this.gameTime(this._pausedAt) : this.gameTime(now);

    ctx.save();

    // 레인 가이드 라인
    ctx.strokeStyle = "rgba(42,28,16,0.06)";
    ctx.lineWidth = 2;
    for (const x of [laneX.slapL, laneX.bass, laneX.slapR]) {
      ctx.beginPath(); ctx.moveTo(x, 8); ctx.lineTo(x, judgeY); ctx.stroke();
    }
    // 판정선
    ctx.strokeStyle = "rgba(42,28,16,0.22)";
    ctx.lineWidth = 2;
    ctx.setLineDash([10, 10]);
    ctx.beginPath();
    ctx.moveTo(laneX.slapL - nr * 1.8, judgeY);
    ctx.lineTo(laneX.slapR + nr * 1.8, judgeY);
    ctx.stroke();
    ctx.setLineDash([]);
    // 판정 링 + 톤 라벨
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const rings = [[laneX.slapL, "딱", "#c0392b"], [laneX.bass, "둥", "#b35a17"], [laneX.slapR, "딱", "#c0392b"]];
    for (const [x, label, col] of rings) {
      ctx.globalAlpha = 0.45;
      ctx.strokeStyle = col;
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(x, judgeY, nr + 5, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = col;
      ctx.font = `900 ${Math.round(nr * 0.55)}px Pretendard, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif`;
      ctx.fillText(label, x, judgeY + nr + 20);
    }
    ctx.globalAlpha = 1;

    // 노트 (시간순 정렬 — approach 밖 미래 노트에서 중단)
    const spawnY = -nr * 2;
    for (const n of this.notes) {
      const tl = n.hitTimeMs - gt;
      if (tl > this.approach) break;
      if (n.status === "hit") continue;
      const x = this._laneX(n);
      if (n.status === "miss") {
        const mp = (gt - n.missAt) / 320;
        if (mp >= 1 || mp < 0) continue;
        ctx.globalAlpha = (1 - mp) * 0.5;
        this._drawNote(ctx, x, judgeY + mp * 46, n.tone, nr * (1 - mp * 0.2));
        ctx.globalAlpha = 1;
        continue;
      }
      const p = 1 - tl / this.approach; // 0(출현) → 1(판정선)
      const y = spawnY + (judgeY - spawnY) * p;
      ctx.globalAlpha = clamp(p * 2.4, 0, 1);
      this._drawNote(ctx, x, y, n.tone, nr);
      ctx.globalAlpha = 1;
    }

    // 콤보
    if (this.sc && this.sc.combo >= 2) {
      const pop = 1 + 0.35 * Math.max(0, 1 - (now - this._comboPopT) / 180);
      ctx.save();
      ctx.translate(cx, Math.max(70, judgeY * 0.22));
      ctx.scale(pop, pop);
      ctx.font = `900 ${Math.round(nr * 1.05)}px Pretendard, "Apple SD Gothic Neo", sans-serif`;
      ctx.fillStyle = "#8a5a2a";
      ctx.fillText(`${this.sc.combo} COMBO`, 0, 0);
      ctx.restore();
    }

    // 카운트다운 / START!
    if (gt < 0) {
      const stepF = -gt / 1000;
      const num = Math.ceil(stepF);
      const prog = num - stepF; // 해당 숫자의 진행 0→1
      const scale = 0.8 + 0.5 * easeOutCubic(Math.min(1, prog * 2.2));
      const alpha = prog < 0.8 ? 1 : 1 - (prog - 0.8) / 0.2;
      ctx.save();
      ctx.globalAlpha = Math.max(0, alpha);
      ctx.translate(cx, app.h * 0.40);
      ctx.scale(scale, scale);
      ctx.font = `900 ${Math.round(app.R * 0.7)}px Pretendard, sans-serif`;
      ctx.lineWidth = 10;
      ctx.lineJoin = "round";
      ctx.strokeStyle = "rgba(255,252,244,0.95)";
      ctx.strokeText(num, 0, 0);
      ctx.fillStyle = "#b35a17";
      ctx.fillText(num, 0, 0);
      ctx.restore();
    } else if (this._startFlashT > 0 && now - this._startFlashT < 650) {
      const fp = (now - this._startFlashT) / 650;
      ctx.save();
      ctx.globalAlpha = 1 - fp;
      ctx.translate(cx, app.h * 0.40);
      const s = 1 + fp * 0.25;
      ctx.scale(s, s);
      ctx.font = `900 ${Math.round(app.R * 0.42)}px Pretendard, sans-serif`;
      ctx.lineWidth = 8;
      ctx.lineJoin = "round";
      ctx.strokeStyle = "rgba(255,252,244,0.95)";
      ctx.strokeText("START!", 0, 0);
      ctx.fillStyle = "#3f9d4e";
      ctx.fillText("START!", 0, 0);
      ctx.restore();
    }

    ctx.restore();
  }

  /* 노트 1개 그리기 — 둥(채운 원) / 딱(링) */
  _drawNote(ctx, x, y, tone, r) {
    ctx.save();
    ctx.translate(x, y);
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    if (tone === "bass") {
      const g = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.2, 0, 0, r);
      g.addColorStop(0, "#d07a2e");
      g.addColorStop(1, "#8a3d12");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.45)";
      ctx.lineWidth = Math.max(1.5, r * 0.09);
      ctx.beginPath(); ctx.arc(0, 0, r * 0.62, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = "#fff";
      ctx.font = `900 ${Math.round(r * 0.72)}px Pretendard, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif`;
      ctx.fillText("둥", 0, 1);
    } else {
      ctx.fillStyle = "#fff7ec";
      ctx.beginPath(); ctx.arc(0, 0, r * 0.94, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#c0392b";
      ctx.lineWidth = Math.max(2.5, r * 0.17);
      ctx.beginPath(); ctx.arc(0, 0, r * 0.80, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = "#c0392b";
      ctx.font = `900 ${Math.round(r * 0.62)}px Pretendard, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif`;
      ctx.fillText("딱", 0, 1);
    }
    ctx.restore();
  }
}

/* ============================================================
   NantaApp — 앱 본체 (입력/레이아웃/렌더링/상태)
   ============================================================ */
class NantaApp {
  constructor() {
    this.canvas = document.getElementById("stage");
    this.ctx = this.canvas.getContext("2d");
    this.audio = new AudioEngine();
    this.particles = new ParticleSystem();
    this.stickL = new Stick(-1);
    this.stickR = new Stick(1);

    this.cx = 0; this.cy = 0; this.R = 100;
    this.counts = { bass: 0, slap: 0 };
    this.spaceSide = -1;                       // Space 연타 시 양손 번갈아 사용
    this.hintAlpha = { bass: 1, slap: 1 };     // 존 안내 라벨(몇 번 치면 사라짐)
    this.shake = { pulseT: -9, jitterT: -9 };  // 북 흔들림 타이머
    this.lastT = performance.now();
    this.started = false;

    this.images = {};

    // ----- 리듬 게임 구성요소 -----
    this.mode = "free";                              // free | game
    this.settings = new Settings();
    this.audio.volume = this.settings.data.volume;   // 저장된 음량 적용
    this.progress = new ProgressManager();
    this.library = new RhythmLibrary();
    this.game = new RhythmGame(this);
    this.rsUI = new RhythmSelectUI(this);
    this.judgeY = 0;
    this.laneX = null;

    this._loadImages();
    this._bindUI();
    this._bindInput();
    this._resize();
    window.addEventListener("resize", () => this._resizeDebounced());
    window.addEventListener("orientationchange", () => this._resizeDebounced());

    requestAnimationFrame(t => this._frame(t));
  }

  /* ---------- 에셋 로딩 (없어도 동작) ---------- */
  _loadImages() {
    for (const [key, url] of Object.entries(ASSETS)) {
      const img = new Image();
      img.onload = () => { this.images[key] = img; };
      img.onerror = () => { console.warn(`[난타] 이미지 누락: ${url} — 대체 그래픽으로 표시합니다.`); };
      img.src = encodeURI(url);
    }
  }

  /* ---------- UI 바인딩 ---------- */
  _bindUI() {
    const muteBtn = document.getElementById("muteBtn");
    const helpBtn = document.getElementById("helpBtn");
    const startBtn = document.getElementById("startBtn");
    const overlay = document.getElementById("introOverlay");

    // 음소거 설정 복원 (프라이빗 모드 등 localStorage 불가 환경 대비)
    const store = {
      get(k) { try { return localStorage.getItem(k); } catch { return null; } },
      set(k, v) { try { localStorage.setItem(k, v); } catch { /* 무시 */ } }
    };
    const savedMute = store.get("nanta.muted") === "1";
    this.audio.setMuted(savedMute);
    muteBtn.textContent = savedMute ? "🔇" : "🔊";

    muteBtn.addEventListener("click", () => {
      const m = !this.audio.muted;
      this.audio.setMuted(m);
      muteBtn.textContent = m ? "🔇" : "🔊";
      store.set("nanta.muted", m ? "1" : "0");
    });

    helpBtn.addEventListener("click", () => {
      overlay.classList.remove("hidden");
    });

    // 리듬 게임 시작 → 리듬 선택 화면으로
    startBtn.addEventListener("click", () => {
      this.audio.ensure();   // 사용자 제스처 안에서 AudioContext 활성화
      this.started = true;
      overlay.classList.add("hidden");
      this.rsUI.open();
    });

    // 자유 연주
    document.getElementById("freePlayBtn").addEventListener("click", () => {
      this.audio.ensure();
      this.started = true;
      overlay.classList.add("hidden");
      this.setMode("free");
    });

    document.getElementById("settingsBtn").addEventListener("click", () => this.openSettings());
    document.getElementById("pauseBtn").addEventListener("click", () => this.game.togglePause());

    // 시작 화면에서 Enter로도 시작
    window.addEventListener("keydown", e => {
      if (e.key === "Enter" && !overlay.classList.contains("hidden")) startBtn.click();
    });

    this._settingsUI();   // 설정 모달 바인딩
    this.setMode("free"); // 초기 HUD/안내문 구성
  }

  /* ---------- 입력 바인딩 ---------- */
  _bindInput() {
    // 포인터(마우스+터치+펜 통합, 멀티터치 지원) — click과 중복되지 않음
    this.canvas.addEventListener("pointerdown", e => {
      e.preventDefault();
      this.audio.ensure();
      const rect = this.canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      this.handleHit(x, y, e.pointerType);
    }, { passive: false });

    // 롱프레스 메뉴/더블탭 확대 방지
    this.canvas.addEventListener("contextmenu", e => e.preventDefault());
    document.addEventListener("gesturestart", e => e.preventDefault());

    // 키보드: F/J = 베이스(중앙), D/K = 슬랩(테두리), Space = 양손 베이스 번갈아
    window.addEventListener("keydown", e => {
      // Esc: 설정 닫기 → 선택 화면 뒤로 → 게임 일시정지
      if (e.code === "Escape") {
        const settings = document.getElementById("settingsModal");
        if (!settings.classList.contains("hidden")) { settings.classList.add("hidden"); return; }
        if (!this.rsUI.el.classList.contains("hidden")) { document.getElementById("rsBackBtn").click(); return; }
        if (this.mode === "game") this.game.togglePause();
        return;
      }
      if (e.repeat || !this.started) return;
      // 오버레이/모달이 떠 있는 동안은 연주 입력 무시
      if (!document.getElementById("introOverlay").classList.contains("hidden")) return;
      if (!this.rsUI.el.classList.contains("hidden")) return;
      if (!document.getElementById("settingsModal").classList.contains("hidden")) return;
      if (this.mode === "game" && this.game.state === "paused") return;
      if (e.code === "Space") e.preventDefault(); // 스크롤 방지
      const R = this.R, cx = this.cx, cy = this.cy;
      switch (e.code) {
        case "KeyF": this.handleHit(cx - R * 0.20, cy + R * 0.04, "key"); break;
        case "KeyJ": this.handleHit(cx + R * 0.20, cy + R * 0.04, "key"); break;
        case "KeyD": this.handleHit(cx - R * 0.66, cy - R * 0.50, "key"); break;
        case "KeyK": this.handleHit(cx + R * 0.66, cy - R * 0.50, "key"); break;
        case "Space": {
          this.spaceSide = -this.spaceSide;
          this.handleHit(cx + this.spaceSide * R * 0.20, cy + R * 0.04, "key");
          break;
        }
      }
    });
  }

  /* ---------- 타격 처리(입력 → 사운드/애니메이션/이펙트) ---------- */
  handleHit(x, y, source) {
    const dx = x - this.cx, dy = y - this.cy;
    const d = Math.hypot(dx, dy);
    const inDrum = d <= this.R * CONFIG.drum.hitOuterRatio;

    let tone, sx = x, sy = y; // sx/sy = 난타채가 실제로 타격할 지점
    if (inDrum) {
      tone = d <= this.R * CONFIG.drum.bassZoneRatio ? "bass" : "slap";
    } else if (this.mode === "game") {
      // 게임 중에는 북 바깥 터치도 허용: 화면 좌우 1/3 = 슬랩, 중앙 = 베이스
      tone = (x < this.w / 3 || x > this.w * 2 / 3) ? "slap" : "bass";
      const side = x < this.cx ? -1 : 1;
      if (tone === "bass") { sx = this.cx + side * this.R * 0.18; sy = this.cy + this.R * 0.04; }
      else { sx = this.cx + side * this.R * 0.66; sy = this.cy - this.R * 0.50; }
    } else {
      return; // 자유 연주에선 북 바깥 무시
    }

    const now = performance.now();

    // 1) 사운드는 무조건 즉시 (연주감의 핵심 — 판정 성공 여부와 무관)
    this.audio.play(tone, 0.85 + Math.random() * 0.3);

    // 2) 해당 방향의 난타채가 타격
    const stick = sx < this.cx ? this.stickL : this.stickR;
    stick.strike(sx, sy, now);

    // 3) 타격 지점 이펙트 + 북 흔들림
    if (tone === "bass") {
      this.particles.emitBass(sx, sy, this.R);
      this.shake.pulseT = now;
    } else {
      this.particles.emitSlap(sx, sy, this.R);
      this.shake.jitterT = now;
    }

    // 4) 모드별 처리
    if (this.mode === "free") {
      // 자유 연주: 의성어 텍스트 + 카운트
      this.particles.emitText(
        sx, sy - this.R * (tone === "bass" ? 0.16 : 0.14),
        tone === "bass" ? "둥!" : "딱!",
        tone === "bass" ? "#a4561a" : "#c0392b",
        this.R * (tone === "bass" ? 0.15 : 0.13)
      );
      this.counts[tone]++;
      document.getElementById(tone === "bass" ? "bassCount" : "slapCount").textContent = this.counts[tone];
    } else {
      // 리듬 게임: 판정으로 전달
      this.game.handleInput(tone);
    }

    // 5) 모바일 햅틱
    if (source === "touch" && this.settings.data.vibrate && navigator.vibrate) {
      navigator.vibrate(tone === "bass" ? 16 : 9);
    }
  }

  /* ---------- 레이아웃/리사이즈 ---------- */
  _resizeDebounced() {
    clearTimeout(this._rzTimer);
    this._rzTimer = setTimeout(() => this._resize(), 120);
  }

  _resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    const w = window.innerWidth, h = window.innerHeight;
    this.canvas.width = Math.round(w * dpr);
    this.canvas.height = Math.round(h * dpr);
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // 이후 좌표는 CSS 픽셀 기준
    this.w = w; this.h = h;

    this.cx = w / 2;
    if (this.mode === "game") {
      // 게임 모드: 북을 작게 아래로 — 위쪽은 노트 낙하 공간
      this.R = Math.max(92, Math.min(w * 0.34, h * 0.225));
      this.cy = h - this.R - Math.max(46, h * 0.06);
      this.judgeY = this.cy - this.R - Math.max(26, this.R * 0.22);
      const slapOff = Math.min(this.cx - this.noteR() - 10, this.R * 1.25);
      this.laneX = { slapL: this.cx - slapOff, bass: this.cx, slapR: this.cx + slapOff };
    } else {
      this.cy = h * CONFIG.drum.cyRatio;
      this.R = Math.max(110, Math.min(w * CONFIG.drum.radiusRatioW, h * CONFIG.drum.radiusRatioH));
      this.judgeY = 0;
      this.laneX = null;
    }

    this.stickL.setLayout(this.cx, this.cy, this.R);
    this.stickR.setLayout(this.cx, this.cy, this.R);
    this.particles.items.length = 0; // 좌표계가 바뀌므로 이펙트 정리
  }

  /* ---------- 북 그리기 ---------- */
  _drawDrum(ctx) {
    const { cx, cy, R } = this;

    // 북면: 실사 이미지(원형 클리핑) 또는 대체 그래픽
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.995, 0, Math.PI * 2);
    ctx.clip();

    const img = this.images.drumHead;
    if (img) {
      // 사진 속 북면 원(CONFIG.photo)을 화면의 북 원에 맞춰 스케일링
      // (사진의 북면이 약간 타원이라 가로/세로를 따로 늘려 정원으로 보정)
      const ph = CONFIG.photo;
      const dw = (R * ph.overscan) / ph.rx;
      const dh = (R * ph.overscan) / ph.ry;
      ctx.drawImage(img, cx - ph.cx * dw, cy - ph.cy * dh, dw, dh);
    } else {
      // 대체 그래픽: 가죽 북면 + 테두리 + 못 장식
      const g = ctx.createRadialGradient(cx - R * 0.2, cy - R * 0.25, R * 0.1, cx, cy, R);
      g.addColorStop(0, "#e6d2a7");
      g.addColorStop(0.55, "#d9c194");
      g.addColorStop(0.85, "#cbae7e");
      g.addColorStop(1, "#b8986a");
      ctx.fillStyle = g;
      ctx.fillRect(cx - R, cy - R, R * 2, R * 2);
      // 중앙 사용감
      const wear = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 0.38);
      wear.addColorStop(0, "rgba(120,90,50,0.20)");
      wear.addColorStop(1, "rgba(120,90,50,0)");
      ctx.fillStyle = wear;
      ctx.fillRect(cx - R, cy - R, R * 2, R * 2);
      // 가장자리 링 + 못
      ctx.strokeStyle = "#9a7b50";
      ctx.lineWidth = R * 0.05;
      ctx.beginPath(); ctx.arc(cx, cy, R * 0.955, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = "#4a3a26";
      for (let i = 0; i < 26; i++) {
        const a = (i / 26) * Math.PI * 2;
        ctx.beginPath();
        ctx.arc(cx + Math.cos(a) * R * 0.90, cy + Math.sin(a) * R * 0.90, R * 0.013, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // 입체감: 가장자리 음영 + 좌상단 은은한 빛
    const shade = ctx.createRadialGradient(cx, cy, R * 0.55, cx, cy, R);
    shade.addColorStop(0, "rgba(90,60,30,0)");
    shade.addColorStop(1, "rgba(90,60,30,0.16)");
    ctx.fillStyle = shade;
    ctx.fillRect(cx - R, cy - R, R * 2, R * 2);
    ctx.restore();

    // 바깥 외곽선(바닥과 분리되어 보이게)
    ctx.strokeStyle = "rgba(60,38,18,0.35)";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx, cy, R * 0.998, 0, Math.PI * 2); ctx.stroke();
  }

  /* ---------- 존 안내(점선 원 + 라벨) ---------- */
  _drawZoneHints(ctx, dt) {
    const { cx, cy, R } = this;
    // 베이스/슬랩을 2번 이상 치면 해당 라벨이 서서히 사라짐
    if (this.counts.bass >= 2) this.hintAlpha.bass = Math.max(0, this.hintAlpha.bass - dt * 1.2);
    if (this.counts.slap >= 2) this.hintAlpha.slap = Math.max(0, this.hintAlpha.slap - dt * 1.2);

    const zoneA = Math.max(this.hintAlpha.bass, this.hintAlpha.slap);
    if (zoneA > 0.01) {
      ctx.save();
      ctx.globalAlpha = zoneA;
      ctx.strokeStyle = "rgba(70,45,20,0.28)";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([7, 9]);
      ctx.beginPath();
      ctx.arc(cx, cy, R * CONFIG.drum.bassZoneRatio, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    if (this.hintAlpha.bass > 0.01) {
      ctx.save();
      ctx.globalAlpha = this.hintAlpha.bass * 0.55;
      ctx.font = `800 ${Math.round(R * 0.085)}px Pretendard, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif`;
      ctx.fillStyle = "#6b4a26";
      ctx.fillText("베이스톤 · 둥", cx, cy + R * 0.30);
      ctx.restore();
    }
    if (this.hintAlpha.slap > 0.01) {
      ctx.save();
      ctx.globalAlpha = this.hintAlpha.slap * 0.55;
      ctx.font = `800 ${Math.round(R * 0.075)}px Pretendard, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif`;
      ctx.fillStyle = "#7a3a26";
      ctx.fillText("슬랩톤 · 딱", cx, cy - R * 0.80);
      ctx.restore();
    }
  }

  /* ---------- 모드 전환 (free ↔ game) ---------- */
  setMode(mode) {
    this.mode = mode;
    const game = mode === "game";
    document.getElementById("freeStat").classList.toggle("hidden", game);
    document.getElementById("gameStat").classList.toggle("hidden", !game);
    document.getElementById("pauseBtn").classList.toggle("hidden", !game);
    document.getElementById("helpBtn").classList.toggle("hidden", game);
    document.getElementById("progressBar").classList.toggle("hidden", !game);
    const coarse = window.matchMedia("(pointer: coarse)").matches;
    document.getElementById("bottomHint").innerHTML = game
      ? `노트가 판정선에 닿는 순간! 중앙 = <b class="bass">둥</b> · 테두리 = <b class="slap">딱</b>`
      : `중앙 = <b class="bass">베이스톤 둥</b> · 테두리 = <b class="slap">슬랩톤 딱</b>` +
        (coarse ? "" : ` &nbsp;|&nbsp; 키보드 F·J 베이스 / D·K 슬랩 / Space`);
    this._resize(); // 모드별 북 크기/판정선 재계산
  }

  /* 노트 반지름 (북 크기에 비례) */
  noteR() {
    return clamp(this.R * 0.17, 19, 30);
  }

  /* ---------- 설정 모달 ---------- */
  openSettings() {
    document.getElementById("settingsModal").classList.remove("hidden");
  }

  _settingsUI() {
    const S = this.settings;
    const modal = document.getElementById("settingsModal");
    const vol = document.getElementById("setVolume");
    const volVal = document.getElementById("setVolumeVal");
    const off = document.getElementById("setOffset");
    const offVal = document.getElementById("setOffsetVal");
    const speedSeg = document.getElementById("setSpeed");
    const tick = document.getElementById("setTick");
    const vib = document.getElementById("setVibrate");

    const reflect = () => {
      vol.value = Math.round(S.data.volume * 100);
      volVal.textContent = vol.value + "%";
      off.value = S.data.offsetMs;
      offVal.textContent = (S.data.offsetMs > 0 ? "+" : "") + S.data.offsetMs + "ms";
      speedSeg.querySelectorAll("button").forEach(b => b.classList.toggle("active", b.dataset.v === S.data.noteSpeed));
      tick.classList.toggle("on", S.data.tick);
      vib.classList.toggle("on", S.data.vibrate);
    };
    vol.addEventListener("input", () => {
      S.data.volume = vol.value / 100;
      this.audio.setVolume(S.data.volume);
      S.save(); reflect();
    });
    off.addEventListener("input", () => {
      S.data.offsetMs = parseInt(off.value, 10) || 0;
      S.save(); reflect();
    });
    speedSeg.addEventListener("click", e => {
      const b = e.target.closest("button[data-v]");
      if (!b) return;
      S.data.noteSpeed = b.dataset.v;
      S.save(); reflect();
    });
    tick.addEventListener("click", () => { S.data.tick = !S.data.tick; S.save(); reflect(); });
    vib.addEventListener("click", () => { S.data.vibrate = !S.data.vibrate; S.save(); reflect(); });
    document.getElementById("settingsClose").addEventListener("click", () => modal.classList.add("hidden"));
    reflect();
  }

  /* ---------- 메인 루프 ---------- */
  _frame(t) {
    const dt = Math.min(0.05, (t - this.lastT) / 1000);
    this.lastT = t;

    this.stickL.update(t);
    this.stickR.update(t);
    this.game.update(t);
    this.particles.update(dt);
    this._render(dt, t);

    requestAnimationFrame(tt => this._frame(tt));
  }

  _render(dt, now) {
    const ctx = this.ctx;
    const { cx, cy, R, w, h } = this;
    ctx.clearRect(0, 0, w, h);

    // 바닥 그림자(타원)
    ctx.save();
    ctx.translate(cx, cy + R * 0.06);
    ctx.scale(1, 0.96);
    const fg = ctx.createRadialGradient(0, 0, R * 0.5, 0, 0, R * 1.22);
    fg.addColorStop(0, "rgba(70,45,20,0.16)");
    fg.addColorStop(1, "rgba(70,45,20,0)");
    ctx.fillStyle = fg;
    ctx.beginPath(); ctx.arc(0, 0, R * 1.22, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // 북 흔들림: 베이스 = 스케일 펄스, 슬랩 = 미세 지터
    let scale = 1, ox = 0, oy = 0;
    const pulseP = (now - this.shake.pulseT) / 240;
    if (pulseP >= 0 && pulseP < 1) scale = 1 - 0.016 * Math.sin(pulseP * Math.PI);
    const jitterP = (now - this.shake.jitterT) / 90;
    if (jitterP >= 0 && jitterP < 1) {
      const m = 2.6 * (1 - jitterP);
      ox = (Math.random() - 0.5) * 2 * m;
      oy = (Math.random() - 0.5) * 2 * m;
    }

    ctx.save();
    ctx.translate(cx + ox, cy + oy);
    ctx.scale(scale, scale);
    ctx.translate(-cx, -cy);

    this._drawDrum(ctx);
    if (this.mode === "free") this._drawZoneHints(ctx, dt); // 존 안내는 자유 연주에서만
    this.particles.draw(ctx, "under"); // 링/글로우/먼지 (채 아래)
    this.stickL.draw(ctx);
    this.stickR.draw(ctx);
    this.particles.draw(ctx, "over");  // 스파크 (채 위)
    ctx.restore();

    // 게임 모드: 레인/노트/판정선/카운트다운
    if (this.mode === "game") this.game.render(ctx);

    // 플로팅 텍스트는 흔들림과 무관하게 맨 위에
    this._drawTexts(ctx);
  }

  /* 플로팅 텍스트 전용 패스 */
  _drawTexts(ctx) {
    for (const p of this.particles.items) {
      if (p.type !== "text") continue;
      const t = p.life / p.max;
      const a = 1 - t;
      ctx.save();
      ctx.globalAlpha = Math.min(1, a * 1.6);
      const size = p.size * (1 + 0.25 * (1 - Math.pow(1 - Math.min(t * 3, 1), 2)));
      ctx.font = `900 ${size}px Pretendard, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif`;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.lineWidth = size * 0.18;
      ctx.lineJoin = "round";
      ctx.strokeStyle = "rgba(255,252,244,0.92)";
      ctx.strokeText(p.str, p.x, p.y);
      ctx.fillStyle = p.color;
      ctx.fillText(p.str, p.x, p.y);
      ctx.restore();
    }
  }
}

/* ---------- 부팅 ---------- */
window.__nanta = new NantaApp(); // 콘솔 디버깅용 전역 노출
</script>
